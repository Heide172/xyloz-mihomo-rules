name: Build rulesets (MRS + SRS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    # Weekly AWS ip-ranges refresh — Mondays 04:17 UTC
    - cron: '17 4 * * 1'

permissions:
  contents: write

env:
  MIHOMO_VERSION: "1.19.9"
  SING_BOX_VERSION: "1.11.4"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl wget jq tar

      # -----------------------------
      # Install Mihomo (for .mrs)
      # -----------------------------
      - name: Download & install Mihomo
        run: |
          set -e
          curl -L "https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-linux-amd64-v${MIHOMO_VERSION}.deb" -o mihomo.deb
          sudo dpkg -i mihomo.deb || true
          sudo apt-get install -f -y
          mihomo -v || true

      # -----------------------------
      # Install sing-box (for .srs)
      # -----------------------------
      - name: Download & install sing-box
        run: |
          set -e
          ARCH="linux-amd64"
          TGZ="sing-box-${SING_BOX_VERSION}-${ARCH}.tar.gz"
          URL="https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/${TGZ}"

          curl -L "$URL" -o "$TGZ"
          tar -xzf "$TGZ"
          sudo install -m 0755 "sing-box-${SING_BOX_VERSION}-${ARCH}/sing-box" /usr/local/bin/sing-box
          sing-box version

      - name: Prepare folders
        run: |
          mkdir -p compiled tmp_build

      # -----------------------------
      # Refresh AWS ap-northeast-2 prefixes (weekly / manual only)
      # On normal pushes the committed file is used as-is.
      # -----------------------------
      - name: Refresh AWS ap-northeast-2 prefixes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          set -e
          curl -sL https://ip-ranges.amazonaws.com/ip-ranges.json -o tmp_build/aws.json
          {
            echo "# AWS region ap-northeast-2 (Seoul) IPv4 prefixes"
            echo "# Source: https://ip-ranges.amazonaws.com/ip-ranges.json (region=ap-northeast-2)"
            echo "# Auto-refreshed weekly by compile.yml; DO NOT EDIT manually."
            jq -r '.prefixes[] | select(.region=="ap-northeast-2") | .ip_prefix' tmp_build/aws.json | sort -u
          } > ip-lists/aws-ap-northeast-2.txt
          echo "AWS ap-northeast-2 prefixes: $(grep -cv '^#' ip-lists/aws-ap-northeast-2.txt)"

      # =========================================
      # 1) DOMAIN LISTS
      #    - mihomo: tmp_build/domains.yaml -> compiled/domains.mrs
      #    - sing-box: tmp_build/domains.json -> compiled/domains.srs
      # =========================================

      - name: Collect domains (raw)
        run: |
          set -e
          OUT="tmp_build/domains_raw.txt"
          : > "$OUT"

          # Собираем домены из lists/*, чистим пробелы, игнорируем пустые/комменты
          find lists -type f -print0 | while IFS= read -r -d '' file; do
            while IFS= read -r line; do
              line="$(echo "$line" | xargs)"
              [[ -z "$line" ]] && continue
              [[ "$line" == \#* ]] && continue
              echo "$line" >> "$OUT"
            done < "$file"
          done

          # Удалим дубли, сохраним стабильную сортировку
          sort -u "$OUT" -o "$OUT"
          echo "Domains: $(wc -l < "$OUT")"

      - name: Build domains.yaml for Mihomo (payload:+.suffix)
        run: |
          set -e
          RAW="tmp_build/domains_raw.txt"
          YAML="tmp_build/domains.yaml"
          echo "payload:" > "$YAML"
          while IFS= read -r d; do
            echo "- '+.${d}'" >> "$YAML"
          done < "$RAW"

      - name: Convert domains.mrs (mihomo)
        run: |
          set -e
          mihomo convert-ruleset domain yaml \
            tmp_build/domains.yaml \
            compiled/domains.mrs

      - name: Build domains.json for sing-box (domain_suffix)
        run: |
          set -e
          RAW="tmp_build/domains_raw.txt"
          JSON="tmp_build/domains.json"

          # Превращаем список строк в JSON-массив
          DOMAINS_ARRAY="$(jq -Rn '[inputs | select(length>0)]' < "$RAW")"

          # Source rule-set для sing-box (домен как suffix)
          jq -n --argjson arr "$DOMAINS_ARRAY" \
            '{version:3, rules:[{domain_suffix:$arr}]}' > "$JSON"

          jq '.rules[0].domain_suffix | length' "$JSON" >/dev/null

      - name: Compile domains.srs (sing-box)
        run: |
          set -e
          sing-box rule-set compile \
            --output compiled/domains.srs \
            tmp_build/domains.json

      # =========================================
      # 2) IP LISTS
      #    - mihomo: tmp_build/ips.txt -> compiled/ips.mrs
      #    - sing-box: tmp_build/ips.json -> compiled/ips.srs
      # =========================================

      - name: Collect IP CIDRs (raw)
        run: |
          set -e
          OUT="tmp_build/ips_raw.txt"
          : > "$OUT"

          find ip-lists -type f -print0 | while IFS= read -r -d '' file; do
            while IFS= read -r line; do
              line="$(echo "$line" | xargs)"
              [[ -z "$line" ]] && continue
              [[ "$line" == \#* ]] && continue
              echo "$line" >> "$OUT"
            done < "$file"
          done

          sort -u "$OUT" -o "$OUT"
          echo "IPs: $(wc -l < "$OUT")"

      - name: Convert ips.mrs (mihomo)
        run: |
          set -e
          mihomo convert-ruleset ipcidr text \
            tmp_build/ips_raw.txt \
            compiled/ips.mrs

      - name: Build ips.json for sing-box (ip_cidr)
        run: |
          set -e
          RAW="tmp_build/ips_raw.txt"
          JSON="tmp_build/ips.json"

          IPS_ARRAY="$(jq -Rn '[inputs | select(length>0)]' < "$RAW")"

          jq -n --argjson arr "$IPS_ARRAY" \
            '{version:3, rules:[{ip_cidr:$arr}]}' > "$JSON"

          jq '.rules[0].ip_cidr | length' "$JSON" >/dev/null

      - name: Compile ips.srs (sing-box)
        run: |
          set -e
          sing-box rule-set compile \
            --output compiled/ips.srs \
            tmp_build/ips.json

      # =========================================
      # 3) ROUTER MOUNT (classical rules .txt)
      #    For mihomo-proxy-ros /root/.config/mihomo/rule_set_list/ mount.
      #    Consumed by RouterOS scripts/xyloz-rules-sync.rsc -> ruleset_txt/xyloz.txt.
      #    telegram.txt is EXCLUDED: Telegram has its own dedicated group on the
      #    router (TELEGRAM_* env), routing it via xyloz too would hijack it.
      # =========================================
      - name: Generate router-classical.txt (mihomo-proxy-ros mount)
        run: |
          set -e
          OUT="compiled/router-classical.txt"
          {
            echo "# Auto-generated classical rules for mihomo-proxy-ros mount."
            echo "# Sourced from lists/*.txt + ip-lists/*.txt (telegram excluded)."
            echo "# DO NOT EDIT; regenerated on each push."
            echo ""
            echo "# --- domains ---"
            # domains_raw.txt is already cleaned + sorted -u
            while IFS= read -r d || [ -n "$d" ]; do
              [[ -z "$d" ]] && continue
              echo "DOMAIN-SUFFIX,${d}"
            done < tmp_build/domains_raw.txt

            echo "# --- ips ---"
            find ip-lists -type f -name '*.txt' ! -name 'telegram.txt' -print0 | sort -z \
              | while IFS= read -r -d '' file; do
                  while IFS= read -r line || [ -n "$line" ]; do
                    ip="$(echo "$line" | xargs)"
                    [[ -z "$ip" || "$ip" == \#* ]] && continue
                    # ranges (a-b) aren't valid classical; skip with a note
                    if [[ "$ip" == *-* ]]; then echo "# skipped range: $ip"; continue; fi
                    [[ "$ip" != */* ]] && ip="${ip}/32"
                    echo "IP-CIDR,${ip}"
                  done < "$file"
                done
          } > "$OUT"
          echo "router-classical rules: $(grep -cE '^(DOMAIN-SUFFIX|IP-CIDR),' "$OUT")"

      # =========================================
      # 4) COMMIT & PUSH
      # =========================================
      - name: Commit changes
        run: |
          set -e
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add ip-lists/ compiled/
          git status --porcelain

          git commit -m "🔧 Auto-build rulesets (MRS + SRS + router-classical)" || echo "No changes"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
